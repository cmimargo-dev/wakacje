<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>SP45 Monitor</title>
<style>
  html, body {
    background-color: #0a2c73;
    color: #FFFFFF;
    font-family: sans-serif;
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100%;
    overflow: hidden;
  }
  
  .monitor-container {
    display: flex;
    width: 100%;
    height: 100%;
    box-sizing: border-box;
    padding: 1vh;
  }

  /* Proporcje dopasowane tak, aby napisy miały dużo miejsca w poziomie */
  .panel-pogoda {
    width: 38%;
    height: 100%;
    background-color: #0d2115;
    border: 4px solid #224430;
    box-sizing: border-box;
    padding: 2vh 2vw;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
  }

  .spacer {
    width: 2%;
  }

  .panel-status {
    width: 60%;
    height: 100%;
    background-color: #0d2115;
    border: 4px solid #224430;
    box-sizing: border-box;
    padding: 2vh 2vw;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
  }

  /* MAKSYMALNIE POWIĘKSZONE CZCIONKI (Dopasowane do szerokiego i niskiego okna w CMS) */
  .f-size-4 { font-size: 4.5vh; line-height: 1.1; } /* Nagłówki: POGODA AKTUALNA, STATUS */
  .f-size-5 { font-size: 5.2vh; line-height: 1.2; } /* Nazwa miejscowości, parametry temperatury, Do wakacji zostało... */
  .f-size-6 { font-size: 7.5vh; line-height: 1.1; } /* Słonecznie / Deszcz, Status lekcji, Dni do wakacji */
  .f-size-7 { font-size: 11vh; font-family: monospace; line-height: 1; } /* Olbrzymi zegar cyfrowy */
  
  /* Kolory i style */
  .c-green-label { color: #86A690; font-weight: bold; }
  .c-white { color: #FFFFFF; font-weight: bold; }
  .c-muted { color: #6B8574; font-size: 3.5vh; font-weight: bold; }
  .c-bright-green { color: #4AF275; font-weight: bold; }
  .c-label-light { color: #B2C7B9; font-weight: bold; }
  .c-cyan { color: #7FE5FF; font-weight: bold; }
  
  hr { border: 0; height: 4px; background-color: #224430; margin: 1vh 0; }
  
  .row-flex {
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .center-flex {
    text-align: center;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    flex-grow: 1;
    margin: 0.5vh 0;
  }
</style>
</head>
<body>

<div class="monitor-container">
    
    <div class="panel-pogoda">
      <div>
        <div class="f-size-4 c-green-label">POGODA AKTUALNA</div>
        <div class="f-size-5 c-white">Kraków Prądnik Cz.</div>
        <div class="f-size-4 c-muted">ul. Meissnera 20</div>
      </div>
      <div class="f-size-6 c-bright-green"><span id="txt-pogoda-stan">☀️ Słonecznie</span></div>
      
      <hr>
      
      <div>
        <div class="f-size-5 c-label-light">Temperatura: <span class="c-white"><span id="txt-pogoda-temp">21</span>°C</span></div>
        <div class="f-size-5 c-label-light" style="margin-top: 0.5vh;">Ciśnienie: <span class="c-cyan"><span id="txt-pogoda-cisnienie">1015</span> hPa</span></div>
        <div class="f-size-5 c-label-light" style="margin-top: 0.5vh;">Wilgotność: <span class="c-cyan"><span id="txt-pogoda-wilgotnosc">55</span>%</span></div>
      </div>
    </div>

    <div class="spacer"></div>

    <div class="panel-status">
      
      <div class="row-flex">
        <div class="f-size-5 c-label-light"><span id="txt-data">Środa</span></div>
        <div class="f-size-7 c-white"><span id="txt-zegar">00:00:00</span></div>
      </div>
      
      <hr>

      <div class="center-flex">
        <div class="f-size-4 c-green-label">STATUS</div>
        <div class="f-size-6 c-bright-green"><span id="txt-status">Więcej lekcji brak</span></div>
        <div class="f-size-5 c-white" style="margin-top: 0.4vh; letter-spacing: 1px;"><b><span id="txt-licznik">--:--</span></b></div>
        <div class="f-size-4 c-label-light" style="margin-top: 0.2vh;"><span id="txt-info">Wszystkie zajęcia zakończone</span></div>
      </div>

      <hr>
      
      <div style="text-align: center; padding-bottom: 0.5vh;">
        <div class="f-size-5 c-label-light">Do wakacji zostało: <span class="c-bright-green f-size-6" style="font-family: monospace; padding-left: 10px;"><span id="txt-wakacje">-- dni</span></span></div>
      </div>

    </div>

</div>

<script type="text/javascript">
var SCHEDULE = [
  { s: 28800, e: 31800, n: '1. lekcja', l: 'Koniec lekcji za:', r: '08:00 - 08:50' },
  { s: 31800, e: 32400, n: 'Przerwa', l: 'Koniec przerwy za:', r: '08:50 - 09:00' },
  { s: 32400, e: 35100, n: '2. lekcja', l: 'Koniec lekcji za:', r: '09:00 - 09:45' },
  { s: 35100, e: 35700, n: 'Przerwa', l: 'Koniec przerwy za:', r: '09:45 - 09:55' },
  { s: 35700, e: 38400, n: '3. lekcja', l: 'Koniec lekcji za:', r: '09:55 - 10:40' },
  { s: 38400, e: 39300, n: 'Przerwa (duża)', l: 'Koniec przerwy za:', r: '10:40 - 10:55' },
  { s: 39300, e: 42000, n: '4. lekcja', l: 'Koniec lekcji za:', r: '10:55 - 11:40' },
  { s: 42000, e: 42600, n: 'Przerwa', l: 'Koniec przerwy za:', r: '11:40 - 11:50' },
  { s: 42600, e: 45300, n: '5. lekcja', l: 'Koniec lekcji za:', r: '11:50 - 12:35' },
  { s: 45300, e: 45900, n: 'Przerwa', l: 'Koniec przerwy za:', r: '12:35 - 12:45' },
  { s: 45900, e: 48600, n: '6. lekcja', l: 'Koniec lekcji za:', r: '12:45 - 13:30' },
  { s: 48600, e: 49800, n: 'Przerwa (duża)', l: 'Koniec przerwy za:', r: '13:30 - 13:50' },
  { s: 49800, e: 52500, n: '7. lekcja', l: 'Koniec lekcji za:', r: '13:50 - 14:35' }
];

function aktualizujPogode() {
  try {
    var url = "https://" + "api.open-meteo.com" + "/v1/forecast?latitude=50.076&longitude=19.976&current=temperature_2m,relative_humidity_2m,surface_pressure,weather_code";

    fetch(url)
      .then(function(response) { return response.json(); })
      .then(function(data) {
        if (!data || !data.current) return;
        var current = data.current;
        
        document.getElementById('txt-pogoda-temp').innerText = Math.round(current.temperature_2m);
        document.getElementById('txt-pogoda-wilgotnosc').innerText = current.relative_humidity_2m;
        document.getElementById('txt-pogoda-cisnienie').innerText = Math.round(current.surface_pressure);

        var code = current.weather_code;
        var stanTekst = "☀️ Słonecznie";

        if (code === 0) stanTekst = "☀️ Słonecznie";
        else if (code === 1 || code === 2) stanTekst = "⛅ Zachmurzenie";
        else if (code === 3) stanTekst = "☁️ Pochmurno";
        else if (code >= 45 && code <= 48) stanTekst = "🌫️ Mgła";
        else if (code >= 51 && code <= 67) stanTekst = "🌧️ Deszcz";
        else if (code >= 71 && code <= 77) stanTekst = "❄️ Śnieg";
        else if (code >= 80 && code <= 82) stanTekst = "🌦️ Przelotny deszcz";
        else if (code >= 95) stanTekst = "⛈️ Burza";

        document.getElementById('txt-pogoda-stan').innerText = stanTekst;
      })
      .catch(function(err) { 
        console.log("Meteo block:", err);
      });
  } catch(e) {}
}

function aktualizujOdliczanieDoWakacji() {
  var teraz = new Date();
  var biezacyRok = teraz.getFullYear();
  var dataWakacji = new Date(biezacyRok, 5, 26);
  
  if (teraz > dataWakacji) {
    dataWakacji = new Date(biezacyRok + 1, 5, 26);
  }
  
  var roznicaCzasu = dataWakacji.getTime() - teraz.getTime();
  var roznicaDni = Math.ceil(roznicaCzasu / (1000 * 60 * 60 * 24));
  
  if ((teraz.getMonth() == 5 && teraz.getDate() >= 26) || teraz.getMonth() == 6 || teraz.getMonth() == 7) {
    document.getElementById('txt-wakacje').innerText = "Trwają wakacje! 🎉";
  } else {
    document.getElementById('txt-wakacje').innerText = roznicaDni + " dni";
  }
}

function odswiezZegar() {
  var teraz = new Date();
  
  var czasStr = teraz.toTimeString().split(' ')[0];
  document.getElementById('txt-zegar').innerText = czasStr;
  
  var dni = ['Niedziela', 'Poniedziałek', 'Wtorek', 'Środa', 'Czwartek', 'Piątek', 'Sobota'];
  document.getElementById('txt-data').innerText = dni[teraz.getDay()];
  
  var aktualnyCzasSekundy = (teraz.getHours() * 3600) + (teraz.getMinutes() * 60) + teraz.getSeconds();
  var znaleziono = false;
  
  for (var i = 0; i < SCHEDULE.length; i++) {
    var lekcja = SCHEDULE[i];
    if (aktualnyCzasSekundy >= lekcja.s && aktualnyCzasSekundy < lekcja.e) {
      var pozostaloSekund = lekcja.e - aktualnyCzasSekundy;
      var minuty = Math.floor(pozostaloSekund / 60);
      var sekundy = pozostaloSekund % 60;
      
      document.getElementById('txt-status').innerText = lekcja.n;
      document.getElementById('txt-licznik').innerText = (minuty < 10 ? "0" : "") + minuty + ":" + (sekundy < 10 ? "0" : "") + sekundy;
      document.getElementById('txt-info').innerText = lekcja.l + " (" + lekcja.r + ")";
      znaleziono = true;
      break;
    }
  }
  
  if (!znaleziono) {
    document.getElementById('txt-status').innerText = "Więcej lekcji brak";
    document.getElementById('txt-licznik').innerText = "--:--";
    document.getElementById('txt-info').innerText = "Wszystkie zajęcia zakończone";
  }
}

try { odswiezZegar(); } catch(e){}
try { aktualizujOdliczanieDoWakacji(); } catch(e){}
try { aktualizujPogode(); } catch(e){}

setInterval(odswiezZegar, 1000);
setInterval(aktualizujOdliczanieDoWakacji, 3600000);
setInterval(aktualizujPogode, 900000);
</script>

</body>
</html>
