<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>SP45 Monitor</title>
<style>
  body {
    background-color: #0a2c73;
    color: #FFFFFF;
    font-family: sans-serif;
    margin: 20px;
  }
  /* Skalowanie tabeli głównej x2 (700px * 2 = 1400px) */
  .main-table {
    width: 1400px;
    border-spacing: 0;
    border-collapse: collapse;
  }
  /* Skalowanie komórek x2 i dopasowanie paddingu */
  .panel-pogoda {
    width: 520px; /* 260px * 2 */
    vertical-align: top;
    background-color: #0d2115;
    border: 6px solid #224430; /* 3px * 2 */
    padding: 12px; /* 6px * 2 */
  }
  .spacer {
    width: 40px; /* 20px * 2 */
  }
  .panel-status {
    width: 840px; /* 420px * 2 */
    vertical-align: top;
    background-color: #0d2115;
    border: 6px solid #224430; /* 3px * 2 */
    padding: 12px; /* 6px * 2 */
  }
  /* Podwojone rozmiary czcionek */
  .f-size-4 { font-size: 24pt; } 
  .f-size-5 { font-size: 28pt; } 
  .f-size-6 { font-size: 48pt; } 
  .f-size-7 { font-size: 72pt; } 
  
  /* Kolory i style pomocnicze */
  .c-green-label { color: #86A690; font-weight: bold; }
  .c-white { color: #FFFFFF; font-weight: bold; }
  .c-muted { color: #6B8574; }
  .c-bright-green { color: #4AF275; font-weight: bold; }
  .c-label-light { color: #B2C7B9; }
  .c-cyan { color: #7FE5FF; font-weight: bold; }
  
  .clock-face { font-family: monospace; color: #FFFFFF; font-weight: bold; }
  .countdown-face { font-family: monospace; color: #4AF275; font-weight: bold; }
  
  hr { border: 0; height: 4px; background-color: #224430; margin: 20px 0; }
</style>
</head>
<body>

<table class="main-table" border="0">
  <tr>
    
    <td class="panel-pogoda">
      <div class="f-size-4 c-green-label">POGODA AKTUALNA</div>
      <div class="f-size-5 c-white">Kraków Prądnik Cz.</div>
      <div class="f-size-4 c-muted">ul. Meissnera 20</div>
      <div class="f-size-6 c-bright-green" style="margin-top: 10px;"><span id="txt-pogoda-stan">☀️ Słonecznie</span></div>
      
      <hr>
      
      <div class="f-size-5 c-label-light">Temperatura: <span class="c-white"><span id="txt-pogoda-temp">--</span>°C</span></div>
      <div class="f-size-5 c-label-light" style="margin-top: 10px;">Ciśnienie: <span class="c-cyan"><span id="txt-pogoda-cisnienie">----</span> hPa</span></div>
      <div class="f-size-5 c-label-light" style="margin-top: 10px;">Wilgotność: <span class="c-cyan"><span id="txt-pogoda-wilgotnosc">--</span>%</span></div>
    </td>

    <td class="spacer">&nbsp;</td>

    <td class="panel-status">
      
      <table border="0" width="100%">
        <tr>
          <td align="left" valign="middle">
            <div class="f-size-5 c-label-light"><b><span id="txt-data">Poniedziałek</span></b></div>
          </td>
          <td align="right" valign="middle">
            <div class="f-size-7 clock-face"><span id="txt-zegar">00:00:00</span></div>
          </td>
        </tr>
      </table>
      
      <hr>

      <center>
        <div class="f-size-4 c-green-label">STATUS</div>
        <div class="f-size-6 c-bright-green" style="margin: 10px 0;"><span id="txt-status">Aktualizacja...</span></div>
        <div class="f-size-4 c-white" style="margin-bottom: 10px;"><span id="txt-licznik">--:--</span></div>
        <div class="f-size-4 c-label-light"><span id="txt-info">Pobieranie planu zajęć</span></div>
      </center>

      <hr>
      
      <center style="padding: 10px 0;">
        <div class="f-size-5 c-label-light">Do wakacji zostało: <span class="f-size-6 countdown-face"><span id="txt-wakacje">-- dni</span></span></div>
      </center>

    </td>

  </tr>
</table>

<script type="text/javascript">
// 1. Plan lekcji
var SCHEDULE = [
  { s: 28800, e: 31800, n: '1. lekcja', l: 'Koniec lekcji za:', r: '08:00 - 08:50' },
  { s: 31800, e: 32400, n: 'Przerwa', l: 'Koniec przerwy za:', r: '08:50 - 09:00' },
  { s: 32400, e: 35100, n: '2. lekcja', l: 'Koniec lekcji za:', r: '09:00 - 09:45' },
  { s: 35100, e: 35700, n: 'Przerwa', l: 'Koniec przerwy za:', r: '09:45 - 09:55' },
  { s: 35700, e: 38400, n: '3. lekcja', l: 'Koniec lekcji za:', r: '09:55 - 10:40' },
  { s: 38400, e: 39300, n: 'Przerwa (duża)', l: 'Koniec przerwy za:', r: '10:40 - 10:55' },
  { s: 39300, e: 42000, n: '4. lekcja', l: 'Koniec lekcji za:', r: '10:55 - 11:40' },
  { s: 42000, e: 42600, n: 'Przerwa', l: 'Koniec przerwy za:', r: '11:40 - 11:50' },
  { s: 42600, e: 45300, n: '5. lekcja', l: 'Koniec lekcji za:', r: '11:50 - 12:35' },
  { s: 45300, e: 45900, n: 'Przerwa', l: 'Koniec przerwy za:', r: '12:35 - 12:45' },
  { s: 45900, e: 48600, n: '6. lekcja', l: 'Koniec lekcji za:', r: '12:45 - 13:30' },
  { s: 48600, e: 49800, n: 'Przerwa (duża)', l: 'Koniec przerwy za:', r: '13:30 - 13:50' },
  { s: 49800, e: 52500, n: '7. lekcja', l: 'Koniec lekcji za:', r: '13:50 - 14:35' }
];

// 2. Dynamiczne pobieranie danych pogodowych (Open-Meteo)
function aktualizujPogode() {
  const lat = 50.076;
  const lon = 19.976;
  const url = `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current=temperature_2m,relative_humidity_2m,surface_pressure,weather_code`;

  fetch(url)
    .then(response => response.json())
    .then(data => {
      const current = data.current;
      
      document.getElementById('txt-pogoda-temp').innerText = Math.round(current.temperature_2m);
      document.getElementById('txt-pogoda-wilgotnosc').innerText = current.relative_humidity_2m;
      document.getElementById('txt-pogoda-cisnienie').innerText = Math.round(current.surface_pressure);

      const code = current.weather_code;
      let stanTekst = "☀️ Słonecznie";

      if (code === 0) {
        stanTekst = "☀️ Słonecznie";
      } else if (code === 1 || code === 2) {
        stanTekst = "⛅ Zachmurzenie";
      } else if (code === 3) {
        stanTekst = "☁️ Pochmurno";
      } else if (code >= 45 && code <= 48) {
        stanTekst = "🌫️ Mgła";
      } else if (code >= 51 && code <= 67) {
        stanTekst = "🌧️ Deszcz";
      } else if (code >= 71 && code <= 77) {
        stanTekst = "❄️ Śnieg";
      } else if (code >= 80 && code <= 82) {
        stanTekst = "🌦️ Przelotny deszcz";
      } else if (code >= 95) {
        stanTekst = "⛈️ Burza";
      }

      document.getElementById('txt-pogoda-stan').innerText = stanTekst;
    })
    .catch(error => console.error("Błąd pogodowy:", error));
}

// 3. Automatyczne odliczanie do najbliższych wakacji
function aktualizujOdliczanieDoWakacji() {
  const teraz = new Date();
  const biezacyRok = teraz.getFullYear();
  
  let dataWakacji = new Date(biezacyRok, 5, 26);
  
  if (teraz > dataWakacji) {
    dataWakacji = new Date(biezacyRok + 1, 5, 26);
  }
  
  const roznicaCzasu = dataWakacji.getTime() - teraz.getTime();
  const roznicaDni = Math.ceil(roznicaCzasu / (1000 * 60 * 60 * 24));
  
  if (teraz.getMonth() == 5 && teraz.getDate() >= 26 || teraz.getMonth() == 6 || teraz.getMonth() == 7) {
    document.getElementById('txt-wakacje').innerText = "Trwają wakacje! 🎉";
  } else {
    document.getElementById('txt-wakacje').innerText = roznicaDni + " dni";
  }
}

// 4. Obsługa zegara i daty
function odswiezZegar() {
  const teraz = new Date();
  
  const czasStr = teraz.toTimeString().split(' ')[0];
  document.getElementById('txt-zegar').innerText = czasStr;
  
  const dni = ['Niedziela', 'Poniedziałek', 'Wtorek', 'Środa', 'Czwartek', 'Piątek', 'Sobota'];
  document.getElementById('txt-data').innerText = dni[teraz.getDay()];
  
  if(document.getElementById('txt-status').innerText === "Aktualizacja...") {
    document.getElementById('txt-status').innerText = "Więcej lekcji brak";
    document.getElementById('txt-info').innerText = "Wszystkie zajęcia zakończone";
  }
}

// Start wszystkich funkcji
aktualizujPogode();
aktualizujOdliczanieDoWakacji();
odswiezZegar();

// Interwały odświeżania danych
setInterval(odswiezZegar, 1000);
setInterval(aktualizujOdliczanieDoWakacji, 3600000);
setInterval(aktualizujPogode, 900000);
</script>

</body>
</html>
